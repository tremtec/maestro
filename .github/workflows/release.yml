name: Release Workflow

on:
  push:
    tags:
      - '*.*.*'
      - '*.*.*-*'

permissions:
  contents: write  # Required for creating releases and uploading assets

jobs:
  build:
    name: Build Release Assets
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Linux builds
          - os: linux
            arch: amd64
            ext: ""
          - os: linux
            arch: arm64
            ext: ""
          - os: linux
            arch: "386"
            ext: ""
          # macOS builds
          - os: darwin
            arch: amd64
            ext: ""
          - os: darwin
            arch: arm64
            ext: ""
          # Windows builds
          - os: windows
            arch: amd64
            ext: ".exe"
          - os: windows
            arch: "386"
            ext: ".exe"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
          cache: true

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME="maestro-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          echo "Building $BINARY_NAME for $GOOS/$GOARCH..."
          go build -ldflags="-s -w -X main.version=${{ steps.get_version.outputs.version }}" -o "dist/$BINARY_NAME" .
          
      - name: Create tarball
        run: |
          BINARY_NAME="maestro-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          TAR_NAME="maestro-${{ steps.get_version.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          cd dist
          tar -czf "$TAR_NAME" "$BINARY_NAME"
          echo "Created $TAR_NAME"

      - name: Generate checksum
        run: |
          cd dist
          sha256sum *.tar.gz >> checksums.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
          # Determine if this is a pre-release
          if [[ "$VERSION" == *-* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: build-*
          merge-multiple: true

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cp artifacts/*.tar.gz release-assets/
          cp artifacts/checksums.txt release-assets/ 2>/dev/null || true
          
          # Create a single checksums file
          cd release-assets
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        run: |
          cat > release-notes.md << 'NOTES'
          ## Maestro ${{ steps.get_version.outputs.version }}

          ### What's New
          
          See [CHANGELOG.md](./CHANGELOG.md) for details.

          ### Installation

          #### macOS
          ```bash
          # Intel Macs
          curl -L -o maestro.tar.gz "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/maestro-${{ steps.get_version.outputs.version }}-darwin-amd64.tar.gz"
          
          # Apple Silicon Macs
          curl -L -o maestro.tar.gz "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/maestro-${{ steps.get_version.outputs.version }}-darwin-arm64.tar.gz"
          
          tar -xzf maestro.tar.gz
          mv maestro /usr/local/bin/
          ```

          #### Linux
          ```bash
          # AMD64
          curl -L -o maestro.tar.gz "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/maestro-${{ steps.get_version.outputs.version }}-linux-amd64.tar.gz"
          
          # ARM64 (e.g., Raspberry Pi, AWS Graviton)
          curl -L -o maestro.tar.gz "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/maestro-${{ steps.get_version.outputs.version }}-linux-arm64.tar.gz"
          
          tar -xzf maestro.tar.gz
          sudo mv maestro /usr/local/bin/
          ```

          #### Windows
          ```powershell
          # AMD64
          curl.exe -L -o maestro.zip "https://github.com/${{ github.repository }}/releases/download/${{ steps.get_version.outputs.version }}/maestro-${{ steps.get_version.outputs.version }}-windows-amd64.zip"
          Expand-Archive -Path maestro.zip -DestinationPath .
          ```

          #### Go Install
          ```bash
          go install github.com/tremtec/maestro@${{ steps.get_version.outputs.version }}
          ```

          ### Verify Checksums
          
          ```bash
          sha256sum -c SHA256SUMS.txt
          ```

          ### Supported Platforms
          
          | OS | Architecture |
          |----|--------------|
          | Linux | amd64, arm64, 386 |
          | macOS | amd64, arm64 (Apple Silicon) |
          | Windows | amd64, 386 |

          ### AI Diamond Chain
          
          This release implements the [AI Diamond Chain methodology](https://tremtec.com/blog/ai-diamond-chain-methodology) for squad-based development.

          ---
          
          **Full Changelog**: https://github.com/${{ github.repository }}/compare/${{ steps.get_version.outputs.version }}...main
          NOTES

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.get_version.outputs.version }} 🎉
          body_path: release-notes.md
          draft: false
          prerelease: ${{ steps.get_version.outputs.prerelease }}
          files: |
            release-assets/*.tar.gz
            release-assets/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Optional: Publish to package registries
  publish:
    name: Publish to Registries
    needs: release
    runs-on: ubuntu-latest
    if: ${{ !contains(github.ref, '-') }}  # Only for stable releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'

      - name: Verify module
        run: |
          go mod verify
          go mod tidy

      # Note: Go modules are automatically available via `go install`
      # No additional publishing needed for Go modules
      
      - name: Notify release
        run: |
          echo "🎉 Release ${{ needs.release.outputs.version }} published!"
          echo "Install with: go install github.com/tremtec/maestro@${{ needs.release.outputs.version }}"
