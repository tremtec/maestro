# Maestro workflow definition
name: my-project
description: Squad-based development orchestrator

# Squad definition — maps roles to OpenCode agent files
agents:
  architect:
    source: .opencode/agent/architect.md
    phase: discovery

  researcher:
    source: .opencode/agent/researcher.md
    phase: discovery

  ux-designer:
    source: .opencode/agent/ux-designer.md
    phase: discovery

  frontend-engineer:
    source: .opencode/agent/frontend-engineer.md
    phase: build

  backend-engineer:
    source: .opencode/agent/backend-engineer.md
    phase: build

  devops-sre:
    source: .opencode/agent/devops-sre.md
    phase: build

  qa-engineer:
    source: .opencode/agent/qa-engineer.md
    phase: quality

  code-reviewer:
    source: .opencode/agent/code-reviewer.md
    phase: quality

# Workflow phases
workflow:
  discovery:
    parallel: true

  synthesis:
    approval: true # pause for human approval before build

  build:
    parallel: true
    tasks:
      - agent: backend-engineer
        depends_on: []
      - agent: devops-sre
        depends_on: []
      - agent: frontend-engineer
        depends_on: [backend-engineer]

  quality_gate:
    commands:
      - go test ./...
      - go vet ./...
    on_failure: fix_and_retry
    max_retries: 3
